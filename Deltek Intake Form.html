<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deltek Intake Form</title>
  <style>
:root {
  color-scheme: light;
  --bg: #f5f6f3;
  --surface: #ffffff;
  --surface-strong: #f0f4f1;
  --ink: #1d2324;
  --muted: #647071;
  --line: #d8dfda;
  --field: #fbfcfb;
  --primary: #23675a;
  --primary-ink: #ffffff;
  --primary-soft: #dcece6;
  --accent: #a8562a;
  --accent-soft: #f4e4d7;
  --danger: #b3261e;
  --warning: #8a6200;
  --success: #1f6d3d;
  --shadow: 0 18px 45px rgba(27, 35, 36, 0.09);
  font-family: Arial, Helvetica, sans-serif;
  font-size: 16px;
  letter-spacing: 0;
}

* {
  box-sizing: border-box;
}

[hidden],
.netlify-bot-field {
  display: none !important;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
}

button,
input,
select,
textarea {
  font: inherit;
  letter-spacing: 0;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

header {
  background: #172122;
  color: #ffffff;
  border-bottom: 4px solid var(--accent);
}

.header-inner {
  width: min(1420px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
}

h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
}

.header-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
  color: #d5dcda;
  font-size: 14px;
}

.meta-pill {
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 999px;
  padding: 6px 10px;
  white-space: nowrap;
}

main {
  width: min(1420px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 36px;
  display: grid;
  grid-template-columns: minmax(430px, 0.95fr) minmax(460px, 1.05fr);
  gap: 22px;
  align-items: start;
}

.success-main {
  display: block;
  max-width: 720px;
}

.surface {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.section-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-strong);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

h2 {
  margin: 0;
  font-size: 19px;
  line-height: 1.2;
}

.count-badge {
  min-width: 34px;
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: var(--primary);
  color: var(--primary-ink);
  font-weight: 700;
  padding: 4px 10px;
}

form {
  padding: 20px;
}

fieldset {
  border: 0;
  padding: 0;
  margin: 0 0 22px;
}

legend {
  width: 100%;
  margin: 0 0 12px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
  text-transform: uppercase;
}

.type-options {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.type-option {
  position: relative;
  display: block;
}

.type-option input {
  position: absolute;
  opacity: 0;
  inset: 0;
  width: 100%;
  height: 100%;
  margin: 0;
  cursor: pointer;
}

.type-label {
  min-height: 74px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--field);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 8px;
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}

.type-title {
  font-weight: 700;
  line-height: 1.15;
}

.type-key {
  color: var(--muted);
  font-size: 12px;
}

.type-option input:focus-visible + .type-label,
.type-option input:checked + .type-label {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: #153d37;
  outline: 2px solid transparent;
}

.type-option input:disabled + .type-label {
  cursor: not-allowed;
  opacity: 0.52;
}

.type-option input:checked + .type-label {
  cursor: default;
  opacity: 1;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 7px;
  min-width: 0;
}

.field.full {
  grid-column: 1 / -1;
}

.checkbox-field {
  justify-content: flex-end;
}

label {
  font-weight: 700;
  color: #273032;
  font-size: 14px;
}

.required {
  color: var(--danger);
  font-weight: 700;
}

input,
select,
textarea {
  width: 100%;
  min-height: 42px;
  border: 1px solid #cbd4ce;
  border-radius: 6px;
  background: var(--field);
  color: var(--ink);
  padding: 9px 10px;
  outline: 0;
}

input[type="checkbox"] {
  width: 18px;
  min-height: 18px;
  padding: 0;
  accent-color: var(--primary);
}

.checkbox-option {
  min-height: 42px;
  border: 1px solid #cbd4ce;
  border-radius: 6px;
  background: var(--field);
  padding: 9px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.checkbox-option:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(35, 103, 90, 0.18);
  background: #ffffff;
}

textarea {
  min-height: 96px;
  resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(35, 103, 90, 0.18);
  background: #ffffff;
}

.supplier-section {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfaf8;
  padding: 14px;
}

.supplier-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.supplier-section h3 {
  margin: 0;
  color: #273032;
  font-size: 15px;
  line-height: 1.2;
}

.supplier-list {
  display: grid;
  gap: 12px;
}

.icon-btn {
  width: 36px;
  min-width: 36px;
  height: 36px;
  border: 1px solid #b9c5be;
  border-radius: 7px;
  background: #ffffff;
  color: var(--primary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.icon-btn:hover {
  background: #f2f5f2;
}

.icon-btn:disabled {
  cursor: not-allowed;
  opacity: 0.5;
}

.detail-label {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.detail-value {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.25;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  padding-top: 4px;
}

.left-actions,
.right-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.btn {
  min-height: 40px;
  border: 1px solid transparent;
  border-radius: 7px;
  padding: 9px 13px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  max-width: 100%;
  text-decoration: none;
}

.btn-primary {
  background: var(--primary);
  color: var(--primary-ink);
}

.btn-primary:hover {
  background: #1d574c;
}

.btn-secondary {
  background: #ffffff;
  border-color: #b9c5be;
  color: #263032;
}

.btn-secondary:hover {
  background: #f2f5f2;
}

.btn-danger {
  background: #ffffff;
  border-color: #e0b1ad;
  color: var(--danger);
}

.btn-danger:hover {
  background: #fff3f1;
}

.queue-tools {
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--line);
}

.filter-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-group select,
.filter-group input {
  width: auto;
  min-width: 160px;
}

.queue-list {
  display: grid;
  gap: 12px;
  padding: 18px 20px 20px;
}

.queue-empty {
  min-height: 160px;
  display: grid;
  place-items: center;
  text-align: center;
  color: var(--muted);
  border: 1px dashed #c4cec7;
  border-radius: 8px;
  background: #fbfcfb;
  padding: 22px;
}

.queue-item {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #ffffff;
  overflow: hidden;
}

.queue-item-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: start;
  padding: 14px;
  border-left: 5px solid var(--primary);
}

.queue-title {
  font-size: 16px;
  font-weight: 700;
  margin: 0 0 6px;
  overflow-wrap: anywhere;
}

.queue-subtitle {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.35;
}

.queue-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.badge {
  border-radius: 999px;
  padding: 5px 8px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  color: #213033;
  background: #eef2ee;
  border: 1px solid #d8dfda;
}

.badge.status-new {
  background: var(--accent-soft);
  border-color: #e8c5ac;
  color: #5e2f17;
}

.badge.status-in-progress {
  background: #fff1ca;
  border-color: #edd584;
  color: var(--warning);
}

.badge.status-complete {
  background: #e1f0e5;
  border-color: #b8d9c3;
  color: var(--success);
}

.badge.type {
  background: var(--primary-soft);
  border-color: #bdd7ce;
  color: #1e554b;
}

.queue-details {
  border-top: 1px solid var(--line);
  padding: 0 14px 14px;
}

details {
  margin-top: 12px;
}

summary {
  cursor: pointer;
  color: var(--primary);
  font-weight: 700;
  min-height: 34px;
  display: inline-flex;
  align-items: center;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.detail-row {
  border: 1px solid #e4e9e5;
  border-radius: 6px;
  padding: 8px;
  background: #fbfcfb;
  min-width: 0;
}

.detail-row.full {
  grid-column: 1 / -1;
}

.queue-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 14px 14px;
}

.mini-btn {
  min-height: 34px;
  padding: 7px 10px;
  font-size: 13px;
}

.success-body {
  padding: 22px 20px 24px;
}

.success-body p {
  margin: 0 0 16px;
  color: var(--muted);
  line-height: 1.45;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  max-width: min(420px, calc(100vw - 36px));
  background: #172122;
  color: #ffffff;
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 12px 14px;
  transform: translateY(16px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease, transform 160ms ease;
  z-index: 10;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 1120px) {
  main {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 760px) {
  .header-inner {
    width: min(100% - 20px, 1420px);
    align-items: flex-start;
    flex-direction: column;
  }

  main {
    width: min(100% - 20px, 1420px);
    padding-top: 16px;
  }

  .type-options,
  .form-grid,
  .detail-grid {
    grid-template-columns: 1fr;
  }

  .field.full,
  .detail-row.full {
    grid-column: auto;
  }

  .section-header,
  .queue-tools,
  .actions {
    align-items: stretch;
    flex-direction: column;
  }

  .left-actions,
  .right-actions,
  .filter-group {
    width: 100%;
  }

  .btn,
  .filter-group select,
  .filter-group input {
    width: 100%;
  }

  .queue-item-head {
    grid-template-columns: 1fr;
  }

  .queue-badges {
    justify-content: flex-start;
  }
}

  </style>
</head>
<body>
  


<div class="app-shell" data-intake-app>
  <header>
    <div class="header-inner">
      <h1>Deltek Intake Form</h1>
      <div class="header-meta" aria-label="Queue summary">
        <span class="meta-pill" id="newCount">New: 0</span>
        <span class="meta-pill" id="progressCount">In Progress: 0</span>
        <span class="meta-pill" id="completeCount">Complete: 0</span>
      </div>
    </div>
  </header>

  <main>
    <section class="surface" aria-labelledby="intakeHeading">
      <div class="section-header">
        <h2 id="intakeHeading">Intake</h2>
      </div>

      <form
        id="intakeForm"
        name="deltek-intake"
        method="POST"
        action="/success/"
        data-netlify="true"
        netlify-honeypot="bot-field"
        novalidate
      >
        <input type="hidden" name="form-name" value="deltek-intake">
        <input type="hidden" id="requestId" name="requestId">
        <input type="hidden" id="createdAt" name="createdAt">
        <input type="hidden" name="queueStatus" value="New">
        <p class="netlify-bot-field">
          <label>Do not fill this out: <input name="bot-field"></label>
        </p>

        <fieldset>
          <legend>Request Type</legend>
          <div class="type-options">
            
              <label class="type-option">
                <input type="radio" name="requestType" value="Opportunity" required data-type-radio>
                <span class="type-label">
                  <span class="type-title">Opportunity</span>
                  <span class="type-key">OPP</span>
                </span>
              </label>
            
              <label class="type-option">
                <input type="radio" name="requestType" value="Project" required data-type-radio>
                <span class="type-label">
                  <span class="type-title">Project</span>
                  <span class="type-key">PRJ</span>
                </span>
              </label>
            
              <label class="type-option">
                <input type="radio" name="requestType" value="Supplier PO" required data-type-radio>
                <span class="type-label">
                  <span class="type-title">Supplier PO</span>
                  <span class="type-key">PO</span>
                </span>
              </label>
            
          </div>
        </fieldset>

        
          
            <fieldset class="specific-fieldset" data-type-panel="Opportunity" hidden disabled>
              <legend>Opportunity Setup</legend>
              <div class="form-grid">
                
                  
  <div
    class="field full checkbox-field"
    
  >
    
      <input type="hidden" name="opportunityCreatePromoProject" value="No">
      <label class="checkbox-option" for="opportunityCreatePromoProject">
        <input
          id="opportunityCreatePromoProject"
          name="opportunityCreatePromoProject"
          type="checkbox"
          value="Yes"
          
          checked
        >
        <span>Create a promo project?</span>
      </label>
    
  </div>

                
              </div>
            </fieldset>
          
        
          
            <fieldset class="specific-fieldset" data-type-panel="Project" hidden disabled>
              <legend>Project Setup</legend>
              <div class="form-grid">
                
                  
  <div
    class="field full checkbox-field"
    
  >
    
      <input type="hidden" name="projectCreatePromoProject" value="No">
      <label class="checkbox-option" for="projectCreatePromoProject">
        <input
          id="projectCreatePromoProject"
          name="projectCreatePromoProject"
          type="checkbox"
          value="Yes"
          
          checked
        >
        <span>Create a promo project?</span>
      </label>
    
  </div>

                
              </div>
            </fieldset>
          
        
          
        

        <fieldset id="commonFieldset" hidden disabled>
          <legend>Request Details</legend>
          <div class="form-grid">
            
              
  <div
    class="field full"
    
  >
    
      <label for="requestTitle">Title of Request <span class="required">*</span></label>
    
      <input
        id="requestTitle"
        name="requestTitle"
        type="text"
        required
        
        
      >
    
    
  </div>

            
              
  <div
    class="field"
    
  >
    
      <label for="projectManager">Project Manager <span class="required">*</span></label>
    
      <input
        id="projectManager"
        name="projectManager"
        type="text"
        list="projectManagerOptions"
        autocomplete="off"
        required
      >
      <datalist id="projectManagerOptions">
        
          <option value="Jordan Lee"></option>
        
          <option value="Casey Rivera"></option>
        
      </datalist>
    
    
  </div>

            
              
  <div
    class="field"
    
  >
    
      <label for="managingPrincipal">Managing Principal <span class="required">*</span></label>
    
      <input
        id="managingPrincipal"
        name="managingPrincipal"
        type="text"
        list="managingPrincipalOptions"
        autocomplete="off"
        required
      >
      <datalist id="managingPrincipalOptions">
        
          <option value="Taylor Morgan"></option>
        
      </datalist>
    
    
  </div>

            
              
  <div
    class="field"
    
  >
    
      <label for="organization">Organization <span class="required">*</span></label>
    
      <select id="organization" name="organization" required>
        <option value="">Select organization</option>
        
          <option value="Tandem DET">Tandem DET</option>
        
          <option value="Tandem CAN">Tandem CAN</option>
        
          <option value="Baird AE">Baird AE</option>
        
          <option value="A3C">A3C</option>
        
      </select>
    
    
  </div>

            
              
  <div
    class="field"
    data-show-for="Opportunity,Project"
  >
    
      <label for="estimatedStartDate">Estimated Start Date <span class="required">*</span></label>
    
      <input
        id="estimatedStartDate"
        name="estimatedStartDate"
        type="date"
        required
        
        
      >
    
    
  </div>

            
              
  <div
    class="field"
    data-show-for="Opportunity,Project"
  >
    
      <label for="estimatedFinishDate">Estimated finish date <span class="required">*</span></label>
    
      <input
        id="estimatedFinishDate"
        name="estimatedFinishDate"
        type="date"
        required
        
        
      >
    
    
  </div>

            
          </div>
        </fieldset>

        
          <fieldset class="specific-fieldset" data-type-panel="Opportunity" hidden disabled>
            <legend>Opportunity Required Information</legend>
            <div class="form-grid">
              
                
  <div
    class="field"
    
  >
    
      <label for="opportunityName">Opportunity name <span class="required">*</span></label>
    
      <input
        id="opportunityName"
        name="opportunityName"
        type="text"
        required
        
        
      >
    
    
  </div>

              
                
  <div
    class="field"
    
  >
    
      <label for="estimatedRevenue">Est Revenue <span class="required">*</span></label>
    
      <input
        id="estimatedRevenue"
        name="estimatedRevenue"
        type="number"
        required
        min="0"
        step="0.01"
      >
    
    
  </div>

              
                
  <div
    class="field"
    
  >
    
      <label for="probability">Probability <span class="required">*</span></label>
    
      <select id="probability" name="probability" required>
        <option value="">Select probability</option>
        
          <option value="0%">0%</option>
        
          <option value="10%">10%</option>
        
          <option value="20%">20%</option>
        
          <option value="30%">30%</option>
        
          <option value="40%">40%</option>
        
          <option value="50%">50%</option>
        
          <option value="60%">60%</option>
        
          <option value="70%">70%</option>
        
          <option value="80%">80%</option>
        
          <option value="90%">90%</option>
        
          <option value="100%">100%</option>
        
      </select>
    
    
  </div>

              
                
  <div
    class="field"
    
  >
    
      <label for="stage">Stage <span class="required">*</span></label>
    
      <select id="stage" name="stage" required>
        <option value="">Select stage</option>
        
          <option value="preproposal">preproposal</option>
        
          <option value="proposal">proposal</option>
        
          <option value="bid">bid</option>
        
          <option value="award">award</option>
        
          <option value="pre-award">pre-award</option>
        
      </select>
    
    
  </div>

              
                
  <div
    class="field"
    
  >
    
      <label for="engineeringCategory">Engineering category <span class="required">*</span></label>
    
      <select id="engineeringCategory" name="engineeringCategory" required>
        <option value="">Select engineering category</option>
        
          <option value="industrial">industrial</option>
        
          <option value="automotive">automotive</option>
        
          <option value="electrical">electrical</option>
        
          <option value="mechanical">mechanical</option>
        
          <option value="structural">structural</option>
        
          <option value="conveyor">conveyor</option>
        
          <option value="controls">controls</option>
        
      </select>
    
    
  </div>

              
                
  <div
    class="field"

    <script>
(function () {
  const app = document.querySelector("[data-intake-app]");
  if (!app) return;

  const form = document.getElementById("intakeForm");
  const commonFieldset = document.getElementById("commonFieldset");
  const requestActions = document.getElementById("requestActions");
  const requestIdInput = document.getElementById("requestId");
  const createdAtInput = document.getElementById("createdAt");
  const queueList = document.getElementById("queueList");
  const queueCount = document.getElementById("queueCount");
  const queueStatusFilter = document.getElementById("queueStatusFilter");
  const queueTypeFilter = document.getElementById("queueTypeFilter");
  const fillSampleButton = document.getElementById("fillSample");
  const toast = document.getElementById("toast");
  const addSupplierButton = document.getElementById("addSupplier");
  const supplierRows = Array.from(document.querySelectorAll("[data-supplier-row]"));
  const typeScopedFields = Array.from(document.querySelectorAll("[data-show-for]"));

  const storageKey = "deltek-intake-queue-v2";
  const legacyStorageKeys = ["deltek-intake-queue-v1"];

  let selectedType = "";
  let queue = loadQueue();
  let toastTimer = null;

  initialize();

  function initialize() {
    form.addEventListener("change", handleFormChange);
    form.addEventListener("submit", handleSubmit);

    document.getElementById("resetForm").addEventListener("click", () => {
      resetIntakeForm();
    });
    fillSampleButton.addEventListener("click", fillSampleData);
    if (addSupplierButton) addSupplierButton.addEventListener("click", addSupplierRow);
    queueStatusFilter.addEventListener("change", renderQueue);
    queueTypeFilter.addEventListener("change", renderQueue);
    document.getElementById("exportQueue").addEventListener("click", exportQueue);
    document.getElementById("clearComplete").addEventListener("click", clearComplete);

    setSelectedType("");
    resetSupplierRows();
    renderQueue();
  }

  function resetIntakeForm() {
    form.reset();
    form.querySelectorAll("[data-type-radio]").forEach((radio) => {
      radio.checked = false;
    });
    resetSupplierRows();
    setSelectedType("");
  }

  function handleFormChange(event) {
    if (event.target.matches("[data-type-radio]")) {
      if (selectedType && event.target.value !== selectedType) {
        event.target.checked = false;
        return;
      }

      setSelectedType(event.target.value);
    }
  }

  function setSelectedType(type) {
    selectedType = type;
    const hasType = Boolean(selectedType);

    commonFieldset.hidden = !hasType;
    commonFieldset.disabled = !hasType;
    requestActions.hidden = !hasType;
    fillSampleButton.hidden = !hasType;

    document.querySelectorAll("[data-type-panel]").forEach((panel) => {
      const isActive = panel.dataset.typePanel === selectedType;
      panel.hidden = !isActive;
      panel.disabled = !isActive;
    });

    updateTypeScopedFields();

    if (selectedType !== "Project") {
      resetSupplierRows();
    }

    if (!hasType) {
      requestIdInput.value = "";
      createdAtInput.value = "";
    } else if (!requestIdInput.value) {
      requestIdInput.value = createRequestId(selectedType);
    }

    updateTypeOptionsLock();
    updateAddSupplierButton();
  }

  function updateTypeScopedFields() {
    typeScopedFields.forEach((field) => {
      const allowedTypes = field.dataset.showFor.split(",").filter(Boolean);
      const isVisible = Boolean(selectedType) && allowedTypes.includes(selectedType);
      field.hidden = !isVisible;
      field.querySelectorAll("input, select, textarea, button").forEach((control) => {
        control.disabled = !isVisible;
      });
    });
  }

  function updateTypeOptionsLock() {
    form.querySelectorAll("[data-type-radio]").forEach((radio) => {
      radio.disabled = Boolean(selectedType) && radio.value !== selectedType;
    });
  }

  function handleSubmit(event) {
    event.preventDefault();
    const checkedType = form.querySelector("[data-type-radio]:checked");

    if (!checkedType) {
      showToast("Select a request type.");
      return;
    }

    selectedType = checkedType.value;
    createdAtInput.value = new Date().toISOString();
    requestIdInput.value = requestIdInput.value || createRequestId(selectedType);

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const formData = new FormData(form);
    storeLocalQueueItem(formData);
    renderQueue();
    resetIntakeForm();
    showToast("Request saved to the work queue.");
    submitIntakeForm(formData);
  }

  function storeLocalQueueItem(formData) {
    const details = Object.fromEntries(formData.entries());
    const item = {
      id: requestIdInput.value,
      type: selectedType,
      status: "New",
      createdAt: createdAtInput.value,
      details,
      supplier: details.supplier || ""
    };

    queue = queue.filter((existing) => existing.id !== item.id);
    queue.unshift(item);
    saveQueue();
  }

  function submitIntakeForm(formData) {
    if (window.location.protocol === "file:") return;

    fetch(form.action, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams(formData).toString()
    }).catch(() => {
      showToast("Saved locally. Online submission did not complete.");
    });
  }

  function fillSampleData() {
    if (!selectedType) {
      showToast("Select a request type before loading sample data.");
      return;
    }

    const samples = getSampleData(selectedType);
    if (!samples) return;

    Object.entries(samples).forEach(([id, value]) => {
      setValue(id, value);
    });
  }

  function getSampleData(type) {
    const today = new Date();
    const commonSample = {
      requestTitle: {
        Opportunity: "Automated inspection line pursuit",
        Project: "Packaging line controls upgrade",
        "Supplier PO": "Safety equipment order"
      }[type],
      projectManager: "Jordan Lee",
      managingPrincipal: "Taylor Morgan",
      organization: "Tandem DET",
      ...(type === "Supplier PO" ? {} : {
        estimatedStartDate: formatDate(addDays(today, 10)),
        estimatedFinishDate: formatDate(addDays(today, 45))
      })
    };

    const typeSamples = {
      Opportunity: {
        opportunityCreatePromoProject: "Yes",
        opportunityName: "North plant modernization",
        estimatedRevenue: "125000.00",
        probability: "70%",
        stage: "proposal",
        engineeringCategory: "controls",
        source: "Tradeshow",
        primaryClient: "Atlas Manufacturing",
        mainContactName: "Maya Chen",
        mainContactPhone: "555-0142"
      },
      Project: {
        projectCreatePromoProject: "Yes",
        projectName: "Packaging line controls upgrade",
        clientName: "Atlas Manufacturing",
        contractType: "Time and Materials",
        supplierMarkupRate: "15%",
        supplier1: "Acme Promotional Products",
        supplier2: "Midwest Industrial Supply"
      },
      "Supplier PO": {
        supplier: "Summit Hardware and Safety (V-11063)",
        poDescription: "Replacement PPE and field safety supplies",
        amount: "2850.00",
        paymentTerms: "Net 30",
        mainContact: "Taylor Morgan",
        deliveryDate: formatDate(addDays(today, 45)),
        deliverTo: "Richmond field office",
        glOrProjectCode: "OPS-4521"
      }
    };

    const typeSample = typeSamples[type];
    if (!typeSample) return null;

    return {
      ...commonSample,
      ...typeSample
    };
  }

  function setValue(id, value) {
    const element = document.getElementById(id);
    if (!element) return;

    const supplierRow = element.closest("[data-supplier-row]");
    if (supplierRow) {
      showSupplierRow(supplierRow);
    }

    if (element.type === "checkbox") {
      const normalizedValue = String(value).trim().toLowerCase();
      element.checked = value === true || ["yes", "true", "1", "checked"].includes(normalizedValue);
      return;
    }

    element.value = value;
  }

  function addSupplierRow() {
    const nextRow = supplierRows.find((row) => row.hidden);
    if (!nextRow) return;

    showSupplierRow(nextRow);
    const input = nextRow.querySelector("input");
    if (input) input.focus();
    updateAddSupplierButton();
  }

  function showSupplierRow(row) {
    row.hidden = false;
    row.querySelectorAll("input, select, textarea, button").forEach((control) => {
      control.disabled = false;
    });
    updateAddSupplierButton();
  }

  function resetSupplierRows() {
    supplierRows.forEach((row, index) => {
      row.hidden = index > 0;
      row.querySelectorAll("input, select, textarea, button").forEach((control) => {
        control.value = "";
        control.disabled = index > 0;
      });
    });
    updateAddSupplierButton();
  }

  function updateAddSupplierButton() {
    if (!addSupplierButton) return;

    const visibleCount = supplierRows.filter((row) => !row.hidden).length;
    addSupplierButton.disabled = selectedType !== "Project" || visibleCount >= supplierRows.length;
  }

  function loadQueue() {
    for (const key of [storageKey, ...legacyStorageKeys]) {
      const storedQueue = readStoredQueue(localStorage, key) || readStoredQueue(sessionStorage, key);
      if (storedQueue) return storedQueue;
    }

    return [];
  }

  function saveQueue() {
    const serializedQueue = JSON.stringify(queue);
    writeStoredQueue(localStorage, storageKey, serializedQueue);
    writeStoredQueue(sessionStorage, storageKey, serializedQueue);
  }

  function readStoredQueue(storage, key) {
    try {
      const stored = storage.getItem(key);
      return stored ? JSON.parse(stored) : null;
    } catch (error) {
      return null;
    }
  }

  function writeStoredQueue(storage, key, value) {
    try {
      storage.setItem(key, value);
    } catch (error) {
      // The queue still works for the current page even if browser storage is unavailable.
    }
  }

  function renderQueue() {
    const statusFilter = queueStatusFilter.value;
    const typeFilter = queueTypeFilter.value;
    const filteredQueue = queue.filter((item) => {
      const statusMatches = statusFilter === "All" || item.status === statusFilter;
      const typeMatches = typeFilter === "All" || item.type === typeFilter;
      return statusMatches && typeMatches;
    });

    updateCounts();
    queueCount.textContent = String(filteredQueue.length);

    if (!filteredQueue.length) {
      queueList.innerHTML = '<div class="queue-empty">No queue items match the current filters.</div>';
      return;
    }

    queueList.innerHTML = filteredQueue.map(renderQueueItem).join("");
    queueList.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", handleQueueAction);
    });
  }

  function renderQueueItem(item) {
    const details = item.details || {};
    const title = details.requestTitle || `${item.type} request`;
    const supplierName = details.supplier || item.supplier || (item.vendor ? item.vendor.name : "");
    const supplierLine = supplierName ? `Supplier: ${supplierName}` : "No supplier selected";
    const statusClass = `status-${item.status.toLowerCase().replaceAll(" ", "-")}`;
    const rows = Object.entries(details)
      .filter(([key]) => !["form-name", "bot-field"].includes(key))
      .map(([key, value]) => renderDetailRow(labelize(key), value || "-"))
      .join("");

    return `
      <article class="queue-item">
        <div class="queue-item-head">
          <div>
            <h3 class="queue-title">${escapeHtml(title)}</h3>
            <div class="queue-subtitle">${escapeHtml(item.id)} | ${escapeHtml(formatDateTime(item.createdAt))} | ${escapeHtml(supplierLine)}</div>
          </div>
          <div class="queue-badges">
            <span class="badge type">${escapeHtml(item.type)}</span>
            <span class="badge ${escapeHtml(statusClass)}">${escapeHtml(item.status)}</span>
          </div>
        </div>
        <div class="queue-details">
          <details>
            <summary>Details</summary>
            <div class="detail-grid">${rows}</div>
          </details>
        </div>
        <div class="queue-actions">
          <button type="button" class="btn btn-secondary mini-btn" data-action="progress" data-id="${escapeHtml(item.id)}">In Progress</button>
          <button type="button" class="btn btn-secondary mini-btn" data-action="complete" data-id="${escapeHtml(item.id)}">Complete</button>
          <button type="button" class="btn btn-danger mini-btn" data-action="delete" data-id="${escapeHtml(item.id)}">Delete</button>
        </div>
      </article>
    `;
  }

  function renderDetailRow(label, value) {
    return `
      <div class="detail-row">
        <span class="detail-label">${escapeHtml(label)}</span>
        <span class="detail-value">${escapeHtml(value)}</span>
      </div>
    `;
  }

  function handleQueueAction(event) {
    const id = event.currentTarget.dataset.id;
    const action = event.currentTarget.dataset.action;
    const index = queue.findIndex((item) => item.id === id);
    if (index === -1) return;

    if (action === "progress") {
      queue[index].status = "In Progress";
      showToast("Queue item marked In Progress.");
    }

    if (action === "complete") {
      queue[index].status = "Complete";
      showToast("Queue item marked Complete.");
    }

    if (action === "delete") {
      queue.splice(index, 1);
      showToast("Queue item deleted.");
    }

    saveQueue();
    renderQueue();
  }

  function clearComplete() {
    const before = queue.length;
    queue = queue.filter((item) => item.status !== "Complete");
    saveQueue();
    renderQueue();
    showToast(`${before - queue.length} completed item(s) cleared.`);
  }

  function exportQueue() {
    if (!queue.length) {
      showToast("There are no queue items to export.");
      return;
    }

    const headers = ["id", "type", "status", "createdAt", "requestTitle", "projectManager", "managingPrincipal", "organization", "estimatedStartDate", "estimatedFinishDate", "supplier", "details"];
    const rows = queue.map((item) => {
      const details = item.details || {};
      const supplierName = details.supplier || item.supplier || (item.vendor ? item.vendor.name : "");
      return [
        item.id,
        item.type,
        item.status,
        item.createdAt,
        details.requestTitle || "",
        details.projectManager || "",
        details.managingPrincipal || "",
        details.organization || "",
        details.estimatedStartDate || "",
        details.estimatedFinishDate || "",
        supplierName,
        JSON.stringify(details)
      ];
    });

    const csv = [headers, ...rows]
      .map((row) => row.map(escapeCsvValue).join(","))
      .join("\n");

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `deltek-intake-queue-${formatDate(new Date())}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showToast("Queue exported as CSV.");
  }

  function updateCounts() {
    const counts = queue.reduce((summary, item) => {
      summary[item.status] = (summary[item.status] || 0) + 1;
      return summary;
    }, {});

    document.getElementById("newCount").textContent = `New: ${counts["New"] || 0}`;
    document.getElementById("progressCount").textContent = `In Progress: ${counts["In Progress"] || 0}`;
    document.getElementById("completeCount").textContent = `Complete: ${counts["Complete"] || 0}`;
  }

  function createRequestId(type) {
    const prefix = {
      Opportunity: "OPP",
      Project: "PRJ",
      "Supplier PO": "PO"
    }[type] || "REQ";
    const timestamp = Date.now().toString(36).toUpperCase();
    const random = Math.random().toString(36).slice(2, 6).toUpperCase();
    return `${prefix}-${timestamp}-${random}`;
  }

  function addDays(date, days) {
    const copy = new Date(date);
    copy.setDate(copy.getDate() + days);
    return copy;
  }

  function formatDate(date) {
    return date.toISOString().slice(0, 10);
  }

  function formatDateTime(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "-";

    return new Intl.DateTimeFormat("en-US", {
      month: "short",
      day: "2-digit",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit"
    }).format(date);
  }

  function labelize(value) {
    return String(value)
      .replace(/([a-z])([A-Z])/g, "$1 $2")
      .replace(/[-_]/g, " ")
      .replace(/\b\w/g, (letter) => letter.toUpperCase());
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeCsvValue(value) {
    const stringValue = String(value ?? "");
    return `"${stringValue.replaceAll('"', '""')}"`;
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove("show");
    }, 2600);
  }
})();

  </script>
  
</body>
</html>
